<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מערכת לוגיסטיקה ניוד</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase v8 (compat - simpler API) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    /* RTL support + base font */
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    /* Slightly smaller typography across app, especially on phones */
    html { font-size: 12px; }
    @media (max-width: 640px) {
      html { font-size: 10px; }
    }

    /* General table: fixed layout, content clipping */
    table.general-table {
      table-layout: fixed;
      border-collapse: collapse;
    }
    table.general-table th,
    table.general-table td {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 6px 4px;
      box-sizing: border-box;
    }
    table.general-table td.gt-name-cell {
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    @media (max-width: 640px) {
      table.general-table th,
      table.general-table td {
        padding: 3px 2px;
      }
    }

    /* Hide scrollbar on tab nav */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* Smooth tab transitions */
    main > div { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

  </style>
</head>
<body class="bg-gray-50">

  <!-- App root -->
  <div id="app">
    <div class="flex items-center justify-center min-h-screen bg-gray-50 text-gray-800" dir="rtl">
      <div class="text-xl font-medium animate-pulse">טוען מערכת...</div>
    </div>
  </div>

  <!-- ─── Data layer ───────────────────────────────── -->
  <script src="data.js?v=25"></script>

  <!-- ─── App infrastructure ──────────────────────── -->
  <script src="state.js?v=25"></script>
  <script src="firebase.js?v=25"></script>
  <script src="activity.js?v=25"></script>

  <!-- ─── UI modules ──────────────────────────────── -->
  <script src="render.js?v=25"></script>
  <script src="ui-home-history.js?v=25"></script>
  <script src="ui-form.js?v=25"></script>
  <script src="ui-dashboard.js?v=25"></script>
  <script src="ui-inventory.js?v=25"></script>
  <script src="ui-database.js?v=25"></script>
  <script src="ui-soldiers.js?v=25"></script>
  <script src="ui-general-table.js?v=25"></script>
  <script src="ui-rasmatz.js?v=25"></script>
  <script src="ui-reports.js?v=25"></script>
  <script src="ui-categories.js?v=25"></script>

  <!-- ─── Logic modules ───────────────────────────── -->
  <script src="export.js?v=25"></script>
  <script src="cart.js?v=25"></script>
  <script src="soldiers.js?v=25"></script>
  <script src="firestore.js?v=25"></script>
  <script src="auth.js?v=25"></script>

  <!-- ─── Boot ────────────────────────────────────── -->
  <script>
    // Initialize default data before Firebase loads
    AppState.inventoryCategories = DEFAULT_INVENTORY_CATEGORIES;
    AppState.weaponsData          = DEFAULT_WEAPONS_DATA;
    AppState.opticsData           = DEFAULT_OPTICS_DATA;
    AppState.commsData            = DEFAULT_COMMS_DATA;
    AppState.ammoData             = DEFAULT_AMMO_DATA;
    AppState.soldiersData         = DEFAULT_SOLDIERS_LIST;

    // Start Firebase and auth
    try {
      initFirebase();
      initAuth();
    } catch (bootErr) {
      console.error('Boot error:', bootErr);
      setState({
        isAuthReady: true,
        authError: bootErr?.message || 'Unexpected boot error while starting Firebase.',
        authErrorCode: 'app/boot-error'
      });
      renderApp();
    }
  </script>
</body>
</html>
